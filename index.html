<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Growth Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(135deg,#ff0000,#ff7b00);
min-height:100vh;
color:white;
}

/* header */

header{
text-align:center;
padding:30px;
}

header h1{
font-size:38px;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

/* tool card */

.tool{
background:white;
color:black;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.tool h2{
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
background:#ff0000;
color:white;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:10px;
background:#f1f1f1;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<h1>🚀 YouTube Growth Tools</h1>
<p>Free Tools For YouTube Creators</p>

</header>


<div class="container">

<!-- Title Generator -->

<div class="tool">

<h2>YouTube Title Generator</h2>

<input id="titleKeyword" placeholder="Enter video keyword">

<button onclick="generateTitle()">Generate Title</button>

<div class="result" id="titleResult"></div>

</div>


<!-- Tags Generator -->

<div class="tool">

<h2>YouTube Tags Generator</h2>

<input id="tagKeyword" placeholder="Enter keyword">

<button onclick="generateTags()">Generate Tags</button>

<div class="result" id="tagResult"></div>

</div>


<!-- Description Generator -->

<div class="tool">

<h2>YouTube Description Generator</h2>

<input id="descKeyword" placeholder="Enter video topic">

<button onclick="generateDesc()">Generate Description</button>

<div class="result" id="descResult"></div>

</div>


<!-- Hashtag Generator -->

<div class="tool">

<h2>YouTube Hashtags Generator</h2>

<input id="hashKeyword" placeholder="Enter keyword">

<button onclick="generateHash()">Generate Hashtags</button>

<div class="result" id="hashResult"></div>

</div>


<!-- Thumbnail Downloader -->

<div class="tool">

<h2>YouTube Thumbnail Downloader</h2>

<input id="thumbUrl" placeholder="Paste YouTube video link">

<button onclick="getThumbnail()">Get Thumbnail</button>

<div class="result" id="thumbResult"></div>

</div>

</div>


<script>

function generateTitle(){

let k=document.getElementById("titleKeyword").value

let titles=[
k+" Full Tutorial",
k+" Beginner Guide",
k+" Secret Tips for "+k,
"How To Master "+k,
k+" Step by Step"
]

document.getElementById("titleResult").innerHTML=titles.join("<br>")

}


function generateTags(){

let k=document.getElementById("tagKeyword").value

let tags=[
k,
k+" tutorial",
k+" tips",
"best "+k,
k+" youtube"
]

document.getElementById("tagResult").innerText=tags.join(", ")

}


function generateDesc(){

let k=document.getElementById("descKeyword").value

let desc="In this video we talk about "+k+". This tutorial will help beginners learn "+k+" step by step. Subscribe for more content."

document.getElementById("descResult").innerText=desc

}


function generateHash(){

let k=document.getElementById("hashKeyword").value

let hash=[
"#"+k,
"#"+k+"tips",
"#"+k+"tutorial",
"#youtube",
"#creator"
]

document.getElementById("hashResult").innerText=hash.join(" ")

}


function getThumbnail(){

let url=document.getElementById("thumbUrl").value

let id=url.split("v=")[1]

if(id){

let thumb="https://img.youtube.com/vi/"+id+"/maxresdefault.jpg"

document.getElementById("thumbResult").innerHTML=

"<img src='"+thumb+"' width='300'><br><a href='"+thumb+"' target='_blank'>Download Thumbnail</a>"

}

}

</script>

</body>
</html>
